seed: 42
device: cpu

data:
  root: data/vqa
  train_split: train
  val_split: val
  answer_vocab_path: data/answer_vocab.json
  answer_vocab_size: 1000
  max_train_samples: 64
  max_val_samples: 32
  image_size: 224
  max_question_length: 32
  num_workers: 0

model:
  text_model_name: distilbert-base-uncased
  hidden_dim: 256
  num_attention_heads: 4
  dropout: 0.2
  freeze_backbones: true
  pretrained_cnn: true

train:
  batch_size: 4
  epochs: 1
  lr: 0.0001
  weight_decay: 0.01
  grad_clip_norm: 1.0
  checkpoint_dir: checkpoints
  checkpoint_name: best.pt
  log_every: 4

infer:
  topk: 5
