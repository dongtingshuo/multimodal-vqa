seed: 42
device: cpu

data:
  root: data/vqa
  train_split: train
  val_split: val
  answer_vocab_path: outputs/smoke_training/answer_vocab.json
  answer_vocab_size: 8
  max_train_samples: 4
  max_val_samples: 2
  image_size: 32
  max_question_length: 12
  num_workers: 0

model:
  name: cross_attention
  text_model_name: distilbert-base-uncased
  hidden_dim: 32
  num_attention_heads: 4
  dropout: 0.0
  freeze_backbones: true
  pretrained_cnn: false
  mock_backbones: true
  mock_hidden_size: 32

train:
  batch_size: 1
  epochs: 2
  lr: 0.001
  image_lr: 0.0001
  text_lr: 0.00005
  weight_decay: 0.0
  grad_clip_norm: 1.0
  gradient_accumulation_steps: 2
  staged_finetuning: true
  freeze_epochs: 1
  unfreeze_image_blocks: 1
  unfreeze_text_layers: 1
  use_amp: false
  checkpoint_dir: outputs/smoke_training
  checkpoint_name: best.pt
  latest_checkpoint_name: latest.pt
  log_every: 1
  selection_metric: vqa_score
  use_scheduler: true
  scheduler_factor: 0.5
  scheduler_patience: 1
  min_lr: 0.000001
  early_stopping_start_epoch: 2
  early_stopping_patience: 0

infer:
  topk: 5
